<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="55%"  stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    <linearGradient id="lineg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="scanclip">
      <rect x="620" y="55" width="230" height="180"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="280" fill="url(#bg)" rx="16"/>

  <!-- grid -->
  <g opacity="0.06" stroke="#58a6ff" stroke-width="0.5">
    <line x1="0" y1="56"  x2="900" y2="56"/>
    <line x1="0" y1="112" x2="900" y2="112"/>
    <line x1="0" y1="168" x2="900" y2="168"/>
    <line x1="0" y1="224" x2="900" y2="224"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="540" y1="0" x2="540" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
  </g>

  <!-- glow orbs -->
  <circle cx="160" cy="260" r="120" fill="#58a6ff" opacity="0.06">
    <animate attributeName="opacity" values="0.04;0.10;0.04" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="780" cy="30" r="100" fill="#a371f7" opacity="0.07">
    <animate attributeName="opacity" values="0.05;0.12;0.05" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- left accent bar -->
  <rect x="48" y="72" width="3" height="136" rx="2" fill="url(#accent)"/>

  <!-- name -->
  <text x="72" y="116" font-family="'Courier New', monospace" font-size="42" font-weight="700" fill="url(#accent)" filter="url(#glow)">Gustavo</text>

  <!-- tagline -->
  <text x="73" y="148" font-family="'Courier New', monospace" font-size="14" fill="#8b949e" letter-spacing="2">BACKEND DEVELOPER  ·  BRAZIL 🇧🇷</text>

  <!-- separator -->
  <line x1="72" y1="162" x2="520" y2="162" stroke="url(#lineg)" stroke-width="1" stroke-dasharray="600" stroke-dashoffset="600">
    <animate attributeName="stroke-dashoffset" from="600" to="0" dur="1.4s" fill="freeze"/>
  </line>

  <!-- pills -->
  <g font-family="'Courier New', monospace" font-size="12">
    <rect x="72"  y="176" width="66" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="0.8"/>
    <text x="105" y="192" text-anchor="middle" fill="#58a6ff">Linux</text>
    <rect x="148" y="176" width="50" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="0.8"/>
    <text x="173" y="192" text-anchor="middle" fill="#EA4B71">n8n</text>
    <rect x="208" y="176" width="60" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="0.8"/>
    <text x="238" y="192" text-anchor="middle" fill="#E34F26">HTML</text>
    <rect x="278" y="176" width="52" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="0.8"/>
    <text x="304" y="192" text-anchor="middle" fill="#1572B6">CSS</text>
    <rect x="340" y="176" width="70" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="0.8"/>
    <text x="375" y="192" text-anchor="middle" fill="#a371f7">C# soon</text>
  </g>

  <!-- status -->
  <rect x="72" y="218" width="140" height="26" rx="13" fill="#1a2332" stroke="#58a6ff" stroke-width="0.8"/>
  <circle cx="90" cy="231" r="4" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="100" y="236" font-family="'Courier New', monospace" font-size="12" fill="#8b949e">open to learn</text>

  <!-- terminal window -->
  <rect x="590" y="44" width="268" height="196" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <rect x="590" y="44" width="268" height="28" rx="10" fill="#21262d"/>
  <rect x="590" y="58" width="268" height="14" fill="#21262d"/>
  <circle cx="610" cy="58" r="5" fill="#ff5f57"/>
  <circle cx="626" cy="58" r="5" fill="#febc2e"/>
  <circle cx="642" cy="58" r="5" fill="#28c840"/>
  <text x="724" y="63" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#8b949e">bash</text>

  <g font-family="'Courier New', monospace" font-size="11" clip-path="url(#scanclip)">
    <text x="604" y="92"  fill="#3fb950">~</text>
    <text x="616" y="92"  fill="#58a6ff">$ </text>
    <text x="630" y="92"  fill="#e6edf3">whoami</text>
    <text x="604" y="110" fill="#8b949e">gustavo · dev</text>
    <text x="604" y="128" fill="#3fb950">~</text>
    <text x="616" y="128" fill="#58a6ff">$ </text>
    <text x="630" y="128" fill="#e6edf3">cat skills.txt</text>
    <text x="604" y="146" fill="#a371f7">html css linux n8n</text>
    <text x="604" y="164" fill="#3fb950">~</text>
    <text x="616" y="164" fill="#58a6ff">$ </text>
    <text x="630" y="164" fill="#e6edf3">echo $next</text>
    <text x="604" y="182" fill="#EA4B71">C# · C++ · Docker</text>
    <text x="604" y="200" fill="#3fb950">~</text>
    <text x="616" y="200" fill="#58a6ff">$ </text>
    <text x="630" y="200" fill="#e6edf3">_</text>
  </g>

  <!-- scan line -->
  <rect x="590" y="72" width="268" height="1" fill="#58a6ff" opacity="0.15" clip-path="url(#scanclip)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,168;0,0" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
